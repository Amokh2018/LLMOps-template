name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - '.github/workflows/deploy.yml'
      - 'infra/**'

env:
  REGISTRY: us-docker.pkg.dev
  REGION: us-central1

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'services/api/') ||
      contains(github.event.head_commit.added, 'services/api/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy api-service \
            --source services/api \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars \
              GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},\
              VERTEX_AI_LOCATION=${{ env.REGION }} \
            --service-account rag-service@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

  deploy-ingestion:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'services/ingestion/') ||
      contains(github.event.head_commit.added, 'services/ingestion/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Deploy Ingestion Job to Cloud Run
        run: |
          gcloud run jobs create ingestion-pipeline \
            --source services/ingestion \
            --platform managed \
            --region ${{ env.REGION }} \
            --set-env-vars \
              GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},\
              VERTEX_AI_LOCATION=${{ env.REGION }} \
            --service-account rag-service@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --update || true

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-ingestion]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          echo "Deployment pipeline completed"
          echo "API Service: ${{ needs.deploy-api.result }}"
          echo "Ingestion Service: ${{ needs.deploy-ingestion.result }}"
