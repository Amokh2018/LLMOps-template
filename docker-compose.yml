version: '3.8'

services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_REGION=${GCP_REGION:-us-central1}
      - VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}
      - VECTOR_STORE_INDEX_ID=${VECTOR_STORE_INDEX_ID}
      - VECTOR_STORE_ENDPOINT=${VECTOR_STORE_ENDPOINT}
      - GCS_BUCKET=${GCS_BUCKET}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_LOG_LEVEL=${API_LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - PYTHONUNBUFFERED=1
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud
      - ${HOME}/.local/share/gcloud:/root/.local/share/gcloud
    depends_on:
      - ingestion
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - rag-network

  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_REGION=${GCP_REGION:-us-central1}
      - VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION:-us-central1}
      - GCS_BUCKET=${GCS_BUCKET}
      - GCS_INGESTION_PREFIX=${GCS_INGESTION_PREFIX:-documents/}
      - VECTOR_STORE_INDEX_ID=${VECTOR_STORE_INDEX_ID}
      - VECTOR_STORE_ENDPOINT=${VECTOR_STORE_ENDPOINT}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-004}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-100}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud
      - ${HOME}/.local/share/gcloud:/root/.local/share/gcloud
    networks:
      - rag-network
    # Ingestion runs once on startup, comment out if you want it to keep running
    restart: "no"

networks:
  rag-network:
    driver: bridge

volumes:
  gcloud-config:
    driver: local
